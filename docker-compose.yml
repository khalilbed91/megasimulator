version: '3.8'
services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: megasimulator
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

  redis:
    image: redis:7
    ports:
      - "6379:6379"

  api:
    build: .
    depends_on:
      - db
      - redis
    environment:
      - CONNECTION_STRINGS__DEFAULT=Host=db;Port=5432;Database=megasimulator;Username=postgres;Password=password
      - REDIS__CONNECTION=redis:6379
    ports:
      - "5000:80"

volumes:
  pgdata:
