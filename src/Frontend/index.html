<!doctype html>
<html lang="fr">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>MegaSimulator — Simulateur salaire brut net, retraite et crédits</title>
    <meta name="description" content="Simulateurs pédagogiques : salaire brut vers net et portage salarial, projection retraite, prêt immobilier et conso. France." />
    <meta property="og:site_name" content="MegaSimulator" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-ENjdO4Dr2bkBIFxQpeoYz1G8Q4fQ775f5e6bZ4l5YkP0h+Wv+4YfRvH+8abtTE1Pi" crossorigin="anonymous">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <!-- Inline data-URI favicon to bypass caching and force updated icon immediately -->
    <link rel="icon" href="data:image/svg+xml;utf8,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2360a5fa'/><circle cx='50' cy='40' r='22' fill='%231b6bff'/><rect x='25' y='55' width='50' height='18' rx='4' fill='%230b1220'/><text x='50' y='66' font-size='28' text-anchor='middle' fill='%23ffffff' font-family='Arial,Helvetica,sans-serif'>$</text></svg>" />
    <link rel="icon" type="image/svg+xml" href="/logo.svg?v=3" />
    <link rel="shortcut icon" href="/logo.svg?v=3" />
    <link rel="apple-touch-icon" sizes="180x180" href="/logo.svg?v=3">
    <meta name="theme-color" content="#ffffff">
    <!-- Google Identity Services -->
    <script src="https://accounts.google.com/gsi/client" async defer></script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
    <script>
      // Force favicon update at runtime to bypass browser cache
      (function(){
        try{
          const svg = "<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' fill='%2360a5fa'/><circle cx='50' cy='40' r='22' fill='%231b6bff'/><rect x='25' y='55' width='50' height='18' rx='4' fill='%230b1220'/><text x='50' y='66' font-size='28' text-anchor='middle' fill='%23ffffff' font-family='Arial,Helvetica,sans-serif'>$</text></svg>";
          const url = 'data:image/svg+xml;utf8,' + encodeURIComponent(svg);
          let link = document.querySelector("link[rel*='icon']");
          if (!link) { link = document.createElement('link'); link.rel = 'icon'; document.getElementsByTagName('head')[0].appendChild(link); }
          link.href = url;
        }catch(e){ console.warn('favicon override failed', e) }
      })();
    </script>
  </body>
</html>
